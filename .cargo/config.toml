[build]
# sccache — shared compilation cache across cargo invocations.
# First build: ~normal.  Subsequent builds: near-instant for unchanged crates.
rustc-wrapper = "/usr/local/bin/sccache"

[target.x86_64-unknown-linux-gnu]
linker = "cc"

[target.x86_64-pc-windows-msvc]
linker = "lld"

# Show cache stats on each build (quiet enough for CI).
[env]
SCCACHE_CACHE_SIZE = "10G"
