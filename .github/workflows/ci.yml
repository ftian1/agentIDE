name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libdbus-1-dev pkg-config
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install
      - name: Build shared types
        run: pnpm --filter shared-types build
      - name: Typecheck
        run: pnpm --filter frontend typecheck

  build-remote-agent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build agent
        run: cargo build -p remote-agent-host --target ${{ matrix.target }} --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/agent

  build-windows:
    needs: build-remote-agent
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Download agent artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: agent-*
          path: apps/frontend/binaries/
          merge-multiple: true
      - name: Rename agent binaries
        run: |
          mv apps/frontend/binaries/agent-x86_64-unknown-linux-gnu apps/frontend/binaries/remote-agent-host-x86_64
          mv apps/frontend/binaries/agent-aarch64-unknown-linux-gnu apps/frontend/binaries/remote-agent-host-aarch64
        shell: bash
      - name: Install frontend
        run: pnpm install
      - name: Build Tauri app (Windows MSI + NSIS)
        run: pnpm tauri build --features ssh
        working-directory: apps/frontend
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-msi
          path: apps/frontend/src-tauri/target/release/bundle/msi/*.msi
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-nsis
          path: apps/frontend/src-tauri/target/release/bundle/nsis/*.exe
