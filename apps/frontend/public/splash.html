<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote AI IDE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
      background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    .splash-card {
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      padding: 32px 40px;
    }
    .name {
      font-size: 14px; font-weight: 600; color: #e6edf3;
      letter-spacing: 0.08em;
    }
    .divider { width: 48px; height: 1px; background: #30363d; }

    /* Pulse progress bar */
    .progress-track {
      width: 200px; height: 3px; background: rgba(255,255,255,0.08);
      border-radius: 2px; overflow: hidden;
    }
    .progress-bar {
      height: 100%; width: 30%; border-radius: 2px;
      background: linear-gradient(90deg, rgba(88,166,255,0.4), rgba(88,166,255,0.9), rgba(88,166,255,0.4));
      animation: pulse-bar 2s ease-in-out infinite;
    }
    @keyframes pulse-bar {
      0% { width: 25%; opacity: 0.5; }
      50% { width: 75%; opacity: 1; }
      100% { width: 25%; opacity: 0.5; }
    }

    .loading-row { display: flex; align-items: center; gap: 5px; }
    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(88,166,255,0.7); animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.3; }
      50% { transform: translateY(-5px); opacity: 1; }
    }

    .status {
      font-size: 11px; color: #8b949e; min-width: 160px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="splash-card">
    <!-- Logo SVG — all paths (no text/font dependency) -->
    <svg width="64" height="64" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer ring -->
      <circle cx="64" cy="64" r="60" stroke="#58a6ff" stroke-width="1" opacity="0.12"/>
      <!-- Outer hexagon -->
      <polygon points="64,16 105.6,40 105.6,88 64,112 22.4,88 22.4,40"
               fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round" opacity="0.7"/>
      <!-- Inner hexagon -->
      <polygon points="64,26 97.3,45.2 97.3,82.8 64,102 30.7,82.8 30.7,45.2"
               fill="none" stroke="#58a6ff" stroke-width="1" stroke-linejoin="round" opacity="0.25"/>
      <!-- ">" cursor as filled path (no font) -->
      <path d="M44,44 L80,64 L44,84 Z" fill="#58a6ff" opacity="0.85"/>
      <!-- Accent dots -->
      <circle cx="40" cy="64" r="3.5" fill="#58a6ff" opacity="0.5"/>
      <circle cx="88" cy="64" r="3.5" fill="#58a6ff" opacity="0.5"/>
    </svg>

    <span class="name">Remote AI IDE</span>
    <div class="divider"></div>
    <div class="progress-track"><div class="progress-bar"></div></div>
    <div class="loading-row">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <span class="status" id="status">Initializing…</span>
  </div>

  <script>
    const steps = ['Initializing…', 'Loading workspace…', 'Almost ready…'];
    let i = 0;
    setInterval(() => {
      document.getElementById('status')!.textContent = steps[i % steps.length];
      i++;
    }, 1000);
  </script>
</body>
</html>
