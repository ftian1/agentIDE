<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Remote AI IDE</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    display:flex; align-items:center; justify-content:center;
    height:100vh; overflow:hidden;
    background:#0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    user-select:none; -webkit-user-select:none;
  }
  .card {
    display:flex; flex-direction:column; align-items:center; gap:18px;
    padding:32px 40px;
  }
  /* Logo: hexagon + triangle (pure CSS, no SVG/font) */
  .logo {
    width:56px; height:56px; position:relative;
    display:flex; align-items:center; justify-content:center;
  }
  .hex {
    width:56px; height:32px; background:rgba(88,166,255,0.12);
    position:absolute;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  }
  .hex-ring {
    width:56px; height:32px; position:absolute;
    border: 2px solid rgba(88,166,255,0.7);
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  }
  .cursor {
    font-size:28px; font-weight:700; color:rgba(88,166,255,0.9);
    font-family:monospace; line-height:1; z-index:1; margin-top:2px;
  }
  .name {
    font-size:14px; font-weight:600; color:#e6edf3; letter-spacing:0.08em;
  }
  .divider { width:48px; height:1px; background:#30363d; }
  .progress-track {
    width:180px; height:3px; background:rgba(255,255,255,0.08);
    border-radius:2px; overflow:hidden;
  }
  .progress-bar {
    height:100%; width:30%; border-radius:2px;
    background:linear-gradient(90deg, rgba(88,166,255,0.4), rgba(88,166,255,0.9), rgba(88,166,255,0.4));
    animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%{ width:25%; opacity:0.5; } 50%{ width:70%; opacity:1; } 100%{ width:25%; opacity:0.5; }
  }
  .status { font-size:11px; color:#8b949e; text-align:center; }
  .dots { display:flex; gap:5px; }
  .dots span {
    width:5px; height:5px; border-radius:50%; background:rgba(88,166,255,0.7);
    animation:bounce 1.2s infinite;
  }
  .dots span:nth-child(2){ animation-delay:0.2s; }
  .dots span:nth-child(3){ animation-delay:0.4s; }
  @keyframes bounce {
    0%,100%{ transform:translateY(0); opacity:0.3; }
    50%{ transform:translateY(-5px); opacity:1; }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="hex"></div>
    <div class="hex-ring"></div>
    <span class="cursor">&gt;</span>
  </div>
  <span class="name">Remote AI IDE</span>
  <div class="divider"></div>
  <div class="progress-track"><div class="progress-bar"></div></div>
  <div class="dots"><span></span><span></span><span></span></div>
  <span class="status" id="status">Initializing…</span>
</div>
<script>
  var steps = ['Initializing…', 'Loading workspace…', 'Almost ready…'];
  var i = 0;
  setInterval(function(){
    document.getElementById('status').textContent = steps[i % 3];
    i++;
  }, 1000);
</script>
</body>
</html>
