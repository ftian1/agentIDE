<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hexagon — stroke weight 4/64 = 6.25%, matching Lucide icons (1.5/24 = 6.25%) -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18"
           stroke="#58a6ff" stroke-width="4" stroke-linejoin="round"/>

  <!-- Center dot — bold, matches hexagon stroke weight -->
  <circle cx="32" cy="32" r="4" fill="#58a6ff"/>

  <!-- Antenna — monochrome blue, matching sidebar icon language -->
  <line x1="32" y1="26" x2="32" y2="12" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="28" y2="8"  stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="36" y2="8"  stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>

  <!-- Top node — single simplified dot -->
  <circle cx="32" cy="11" r="2.5" fill="#58a6ff"/>
</svg>
