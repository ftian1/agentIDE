<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent IDE</title>
    <!-- Dark background on both native window (Rust) and HTML layer.
         Native window backgroundColor (#0d1117) prevents the white flash
         during WebView2 cold start.  The inline splash below renders
         instantly before React boots, giving the user a branded loading
         state instead of a blank dark window. -->
    <style>
      html, body, #root {
        margin: 0; padding: 0;
        height: 100%; overflow: hidden;
        background: #0d1117; color: #e6edf3;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      /* Splash — shown until React mounts and renders into #root */
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0d1117; z-index: 9999;
        pointer-events: none;  /* don't block React from loading */
        transition: opacity 0.25s ease-out;
      }
      #splash .logo {
        font-size: 28px; font-weight: 700; letter-spacing: 1px;
        color: #e6edf3; margin-bottom: 16px;
      }
      #splash .spinner {
        width: 32px; height: 32px;
        border: 3px solid #30363d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Flashing red border for required fields (reconnect fallback) */
      @keyframes flash-border {
        0%, 100% { border-color: #f85149; box-shadow: 0 0 4px rgba(248,81,73,0.4); }
        50% { border-color: #30363d; box-shadow: none; }
      }
      .field-highlight {
        animation: flash-border 1.2s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <!-- Splash: shown until React mounts -->
    <div id="splash">
      <div class="logo">Agent IDE</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
